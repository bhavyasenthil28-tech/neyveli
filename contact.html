<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - NEYVELI Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        .social-links a {
            display: inline-block;
            width: 40px;
            height: 40px;
            background: var(--primary-color);
            color: #fff;
            text-align: center;
            line-height: 40px;
            border-radius: 50%;
            font-weight: bold;
        }
        .social-links a:hover {
            background: var(--secondary-color);
            transform: translateY(-3px);
        }
        @media (max-width: 768px) {
            .contact-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header></header>
    <main>
        <div class="breadcrumb">
            <a href="index.html">Home</a> &raquo; <span>Contact Us</span>
        </div>
        <section class="container">
            <h1 class="section-title">Contact Us</h1>
            <div class="contact-layout">
                <div>
                    <h3 style="color:var(--primary-color); margin-bottom: 1.5rem;">Send us a Message</h3>
                    <form action="#" onsubmit="event.preventDefault(); alert('Message Sent Successfully!');">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" required placeholder="Your Name">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" required placeholder="Your Email">
                        </div>
                        <div class="form-group">
                            <label>Message</label>
                            <textarea rows="5" required placeholder="Your Message"></textarea>
                        </div>
                        <button type="submit" class="btn-primary" style="border:none; cursor:pointer;">Submit</button>
                    </form>
                </div>
                <div>
                    <h3 style="color:var(--primary-color); margin-bottom: 1.5rem;">Contact Information</h3>
                    <p style="margin-bottom: 1rem;">
                        <strong>Address:</strong><br>
                        New No 39 (Old No 16,17),<br>
                        2nd Floor,<br>
                        Kodambakkam Road,<br>
                        West Mambalam,<br>
                        Chennai – 600033.
                    </p>
                    <p style="margin-bottom: 1rem;">
                        <strong>Email:</strong> <a href="mailto:sales@jbsoft.in">sales@jbsoft.in</a>
                    </p>
                    <p style="margin-bottom: 1.5rem;">
                        <strong>Phone:</strong> <a href="tel:+919840279047">+91 98402 79047</a>
                    </p>

                    <h3 style="color:var(--primary-color); margin-bottom: 1rem;">Follow Us</h3>
                    <div class="social-links">
                        <a href="https://facebook.com" title="Facebook">FB</a>
                        <a href="https://instagram.com" title="Instagram">IG</a>
                        <a href="https://youtube.com" title="YouTube">YT</a>
                        <a href="https://twitter.com" title="X (Twitter)">X</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer></footer>
    <script src="js/main.js"></script>
</body>
</html>
